<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>画像表示</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh; /* 画面全体の高さ */
    background-color: #f0f0f0;
  }

  img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain; /* 画像全体を収める */
  }
</style>
</head>

<body>
  <img src="xword2.jpg" alt="画像">
</body>
</html>
